<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
          crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>{{ title }}</title>
</head>
<body>
<header>
    <nav class="navbar navbar-light bg-light d-flex justify-content-between">
        <h3 class="mb-0 logo-text">Рецепты</h3>
        <div class="d-flex align-items-center">
            {% if current_user.is_authenticated %}
            <span class="mr-3">
                {{ current_user.name }} ({{ current_user.email }})
            </span>
            <a href="/logout" class="btn btn-danger">Logout</a>
        {% else %}
            <a href="/register" class="btn btn-custom-green mr-2">Register</a>
            <a href="/login" class="btn btn-custom-purple">Sign in</a>
        {% endif %}
        </div>
        <span class="mr-3">Cibo</span>
    </nav>
    <h4>Выбирайте то, что вам по душе!</h4>
</header>
<main role="main" class="container">
    {% block content %}{% endblock %}
</main>
</body>
</html>
