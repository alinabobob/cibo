<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
          crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Playfair+Display&display=swap" rel="stylesheet">
    <title>{{ title }}</title>
</head>
<body>
<header>
    <nav class="navbar navbar-light bg-light d-flex justify-content-between">
        <h3 class="mb-0 logo-text">Рецепты</h3>
        <div class="d-flex align-items-center">
            {% if current_user.is_authenticated %}
                 <a href="/profile/{{ current_user.id }}" class="d-flex align-items-center user-link">
                     <img src="{{ url_for('static', filename=current_user.avatar or 'img/base_av.png') }}"
                          style="width:40px; height:40px; border-radius:50%; object-fit:cover; margin-right:8px;">
                     <span class="mr-2">
                         {{ current_user.name }}
                     </span>
                 </a>
                 <a href="/logout" class="btn btn-custom-purple">Logout</a>
            {% else %}
                 <a href="/register" class="btn btn-custom-green">Register</a>
                 <a href="/login" class="btn btn-custom-purple">Sign in</a>
            {% endif %}
        </div>
        <span class="mr-3">Cibo</span>
    </nav>
    <h4 class="header h4">Выбирайте то, что вам по душе!</h4>
</header>
<main role="main" class="container">
    {% block content %}{% endblock %}
</main>
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
<script>
document.addEventListener('DOMContentLoaded', function () {
  const subscribeButtons = document.querySelectorAll('.subscribe-btn');
  subscribeButtons.forEach(function (button) {
    button.addEventListener('click', function (event) {
      event.preventDefault();
      const url = button.getAttribute('data-url');
      fetch(url)
        .then(response => {
          if (!response.ok) throw new Error('Ошибка подписки');
          return response.text();
        })
        .then(() => {
          Swal.fire({
            title: 'Успех!',
            text: 'Вы успешно подписались.',
            icon: 'success',
            timer: 1500,
            showConfirmButton: false
          });
          button.textContent = 'Подписан ✅';
          button.disabled = true;
          button.classList.remove('btn-outline-primary');
          button.classList.add('btn-success');
        })
        .catch(error => Swal.fire('Ошибка', error.message, 'error'));
    });
  });

  const unsubscribeButtons = document.querySelectorAll('.unsubscribe-btn');
  unsubscribeButtons.forEach(function (button) {
    button.addEventListener('click', function (event) {
      event.preventDefault();

      const url = button.getAttribute('data-url');

      Swal.fire({
        title: 'Вы уверены?',
        text: "Вы хотите отписаться от этого пользователя?",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#7d8778',
        cancelButtonColor: '#827887',
        confirmButtonText: 'Да, отписаться!'
      }).then((result) => {
        if (result.isConfirmed) {
          fetch(url)
            .then(response => {
              if (!response.ok) throw new Error('Ошибка при отписке');
              return response.text();
            })
            .then(() => {
              Swal.fire({
                title: 'Готово!',
                text: 'Вы успешно отписались.',
                icon: 'success',
                timer: 1500,
                showConfirmButton: false
              });
              button.closest('li').remove();
            })
            .catch(error => Swal.fire('Ошибка', error.message, 'error'));
        }
      });
    });
  });
});
</script>
