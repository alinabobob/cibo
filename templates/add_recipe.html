{% extends "base.html" %}

{% block content %}
<h2>Новый рецепт</h2>
<form method="post" enctype="multipart/form-data">
    <div class="recipe-image-upload">
        <label for="image-input">
            <div class="recipe-upload-box">
                Нажмите, чтобы выбрать изображение
            </div>
        </label>
        <input type="file" name="image" id="image-input" hidden>
    </div>
    <img id="preview" style="max-width:100%; display:none;">
    <p>
        Название<br>
        <input type="text" name="title" class="form-control">
    </p>
    <p>
        Категория<br>
        <input type="text" name="category" class="form-control">
    </p>
    <p>
        Кухня<br>
        <input type="text" name="cuisine" class="form-control">
    </p>
    <p>
        Сложность<br>
        <input type="text" name="complexity" class="form-control">
    </p>
    <p>
        Время готовки(мин)<br>
        <input type="text" name="cooking_time" class="form-control">
    </p>
    <p>
        Тип блюда<br>
        <input type="text" name="type" class="form-control">
    </p>
        Тип приёма пищи<br>
        <input type="text" name="food_intake" class="form-control">
    </p>
    <p>
        Ингредиенты<br>
        <textarea name="ingredients" class="form-control"></textarea>
    </p>
    <p>
        Описание<br>
        <textarea name="text" class="form-control"></textarea>
    </p>
    <p>
        Подробная инструкция<br>
        <textarea name="manual" class="form-control"></textarea>
    </p>
    <button class="btn btn-custom-green">Добавить</button>
    {% if message %}
        <div class="alert alert-danger">{{ message }}</div>
    {% endif %}
</form>
<script>
document.getElementById('image-input').onchange = function (evt) {const [file] = this.files
if (file) {const preview = document.getElementById('preview')
preview.src = URL.createObjectURL(file)
preview.style.display = 'block'}}
</script>
{% endblock %}
