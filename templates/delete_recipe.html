{% extends "base.html" %}
{% block content %}
<div class="container my-5">
    <h2>Удалить рецепт</h2>
    <p>Вы уверены, что хотите удалить рецепт "{{ recipe.title }}"?</p>
    <form method="post">
        <button type="submit" class="btn btn-custom-purple">Удалить</button>
        <a href="{{ url_for('profile', user_id=current_user.id) }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
